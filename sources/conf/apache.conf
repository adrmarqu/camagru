<VirtualHost *:80>
    # DocumentRoot apunta a la carpeta pública
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Bloquear acceso directo al código fuente
    <Directory /var/www/srcs>
        Require all denied
    </Directory>

    ErrorLog /var/log/apache2/error.log
    CustomLog /var/log/apache2/access.log combined
</VirtualHost>