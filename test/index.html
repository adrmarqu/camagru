<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="camera-app">

        <!-- 1. Selección de stickers -->
        <div id="sticker-picker">
            <img src="images/bright.png" alt="bright" title="bright">
            <img src="images/fire.png" alt="fire" title="fire">
            <img src="images/flowers.png" alt="flowers" title="flowers">
            <img src="images/fog.png" alt="fog" title="fog">
            <img src="images/glasses.png" alt="glasses" title="glasses">
        </div>

        <!-- 2. Zona cámara + overlay -->
        <div id="camera-stage">

            <video
                id="webcam"
                autoplay
                playsinline
                webkit-playsinline
                muted
                disablepictureinpicture
            ></video>

            <!-- stickers superpuestos -->
            <div id="sticker-overlay"></div>

        </div>

        <!-- 3. Resultado final -->
        <div id="photo-result">
            <canvas id="photo-canvas" class="hidden"></canvas>
            <img
                id="photo-final"
                class="hidden"
                alt="final photo"
                title="Final photo"
            >
        </div>

        <!-- 4. Controles -->
        <div id="camera-controls">

            <button id="btn-cancel" class="transparent">
                Cancelar
            </button>

            <button id="btn-capture" disabled>
                Foto
            </button>

            <input type="file" id="file-input" accept=".jpg .jpeg .png" class="hidden">
            <button id="btn-upload" class="transparent">
                Subir
            </button>

        </div>

    </main>
</body>
</html>
